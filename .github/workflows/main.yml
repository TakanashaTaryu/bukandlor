name: Deploy Laravel 11 to FTP Server

on:
  push:
    branches:
      - main  # Trigger deploy saat ada perubahan pada branch 'main'

jobs:
  deploy:
    name: Deploy to FTP Server
    runs-on: ubuntu-latest  # Menjalankan pekerjaan di runner Ubuntu

    steps:
      # Langkah 1: Checkout kode dari repository
      - name: Checkout code
        uses: actions/checkout@v3

      # Langkah 2: Setup PHP environment (untuk menjalankan Laravel)
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3.11'  # Sesuaikan versi PHP Anda
          extensions: mbstring, bcmath
          ini-values: post_max_size=256M, upload_max_filesize=256M
          tools: composer

      # Langkah 3: Install dependensi Laravel
      - name: Install Dependencies
        run: |
          composer install --no-dev --prefer-dist --optimize-autoloader
          npm install

      # Langkah 4: Build assets frontend (jika menggunakan build tools seperti Vite atau lainnya)
      - name: Build Assets
        run: npm run build  # Pastikan frontend siap untuk di-upload

      # Langkah 5: Deploy seluruh aplikasi ke server FTP
      - name: FTP Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}  # Server FTP Anda (gunakan Secrets)
          username: ${{ secrets.FTP_USERNAME }}  # Username FTP Anda (gunakan Secrets)
          password: ${{ secrets.FTP_PASSWORD }}  # Password FTP Anda (gunakan Secrets)
          local-dir: ./  # Seluruh direktori proyek akan di-upload
